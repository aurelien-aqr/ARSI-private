<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARSI Studio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235ba3d9'/><text x='16' y='22' font-family='monospace' font-weight='800' font-size='18' fill='%23131720' text-anchor='middle'>A</text></svg>">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    background: oklch(0.15 0.008 250);
    color: oklch(0.93 0.006 250);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  a { color: oklch(0.72 0.13 225); text-decoration:none; }
  a:hover { color: oklch(0.82 0.13 225); }
  input, textarea, button, select { font-family: inherit; }
  textarea:focus, input:focus { outline: 1px solid oklch(0.55 0.1 225); }
  ::-webkit-scrollbar { width:9px; height:9px; }
  ::-webkit-scrollbar-thumb { background: oklch(0.32 0.014 250); border-radius:6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes arsipulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  @keyframes arsislide { from { opacity:0; transform:translateY(8px) scale(0.96); } to { opacity:1; transform:none; } }
  @keyframes arsispin { to { transform:rotate(360deg); } }
  /* run screen: sweep over the frame being analysed, then the bar that counts
     down how long its verdict stays on the big viewer */
  @keyframes arsiscan { 0% { transform:translateY(-100%); } 100% { transform:translateY(100%); } }
  @keyframes arsihold { from { transform:scaleX(1); } to { transform:scaleX(0); } }
  /* help tooltips: <span class="hint" data-tip="..."> ? </span> */
  .hint { display:inline-flex; align-items:center; justify-content:center;
    width:15px; height:15px; border-radius:50%; font-size:10px; font-weight:700;
    background:oklch(0.24 0.012 250); color:oklch(0.65 0.012 250);
    border:1px solid oklch(0.34 0.014 250); cursor:help; position:relative;
    vertical-align:middle; margin-left:6px; }
  .hint:hover { color:oklch(0.9 0.006 250); }
  /* the bubble itself is a floating fixed-position div managed by app.js
     (a CSS ::after bubble gets clipped by overflow:auto/hidden ancestors) */
  #arsi-tip {
    position:fixed; z-index:99; display:none; max-width:300px;
    white-space:normal; font-size:11.5px; font-weight:400; line-height:1.45;
    text-align:left; padding:8px 11px; border-radius:8px;
    background:oklch(0.22 0.012 250); color:oklch(0.92 0.006 250);
    border:1px solid oklch(0.38 0.014 250);
    box-shadow:0 10px 28px -10px rgba(0,0,0,0.8); pointer-events:none; }
  /* Light mode: invert the whole UI, then restore real photos so CCTV frames stay true */
  .arsi-app.light { filter: invert(1) hue-rotate(180deg); }
  .arsi-app.light img { filter: invert(1) hue-rotate(180deg); }
  .arsi-app { transition: filter .18s ease; height:100vh; display:flex; background:oklch(0.15 0.008 250); }
  .hoverable:hover { background: oklch(0.19 0.012 250) !important; }
  .navitem:hover { color: oklch(0.88 0.006 250) !important; }
  button:hover { filter: brightness(1.12); }
</style>
</head>
<body>
<div id="app"></div>
<!-- file inputs live OUTSIDE #app: a re-render (health poll, SSE event) while
     the file dialog is open would otherwise destroy the input the dialog is
     bound to, and its change event would never reach the app -->
<input type="file" id="videoFile" data-change="videoFile" accept="video/*" style="display:none;">
<input type="file" id="refFile" data-change="refFile" accept="image/*" style="display:none;">
<script src="app.js"></script>
</body>
</html>
